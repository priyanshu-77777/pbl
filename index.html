<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Portal</title>

<link rel="stylesheet" href="style.css">
</head>

<body>


<div class="circle c1"></div>
<div class="circle c2"></div>

<img src="https://cdn-icons-png.flaticon.com/512/29/29302.png" class="bg-icon icon1">
<img src="https://cdn-icons-png.flaticon.com/512/2995/2995459.png" class="bg-icon icon2">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="bg-icon icon3">
<img src="https://cdn-icons-png.flaticon.com/512/29/29302.png" class="bg-icon icon1">
<img src="https://cdn-icons-png.flaticon.com/512/2995/2995459.png" class="bg-icon icon2">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="bg-icon icon3">


<img src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png" class="bg-icon icon4">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png" class="bg-icon icon5">
<img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" class="bg-icon icon6">


<div class="container">

  <div class="left">
    <h1>Student Portal</h1>
    <p>Manage notes, assignments and resources in a modern system.</p>
  </div>

  <div class="right">

    <div class="tabs">
      <button id="loginBtn" class="active">Login</button>
      <button id="registerBtn">Register</button>
    </div>

    <div id="loginForm" class="form active">
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">
      <button class="submit">Login</button>
    </div>

    <div id="registerForm" class="form">
      <input type="text" placeholder="Full Name">
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">

      <select>
        <option>Student</option>
        <option>Faculty</option>
        <option>Admin</option>
      </select>

      <button class="submit">Register</button>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
