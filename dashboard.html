<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="dashboard.css">

</head>

<body>


<div class="sidebar">
  <h2>Portal</h2>
  <ul>
    <li class="active">Dashboard</li>
    <li onclick="location.href='notes.html'">Notes</li>
    <li>Assignments</li>
    <li>Profile</li>
    <li>Logout</li>
  </ul>
</div>


<div class="main">

 
  <div class="top">
    <h1>Welcome  </h1>
    <p>Student Dashboard</p>
  </div>

  
  <div class="cards">
    <div class="card">
      <h3>📚 Notes</h3>
      <p>12</p>
    </div>
    <div class="card">
      <h3>📝 Assignments</h3>
      <p>5</p>
    </div>
    <div class="card">
      <h3>🔔 Notifications</h3>
      <p>3</p>
    </div>
  </div>

  
  <div class="actions">
    <button>Add Note</button>
    <button>Upload Assignment</button>
    <button>View Profile</button>
  </div>

  
  <div class="activity">
    <h2>Recent Activity</h2>
    <ul>
      <li>Uploaded Java Notes</li>
      <li>Assignment due tomorrow</li>
      <li>Profile updated</li>
    </ul>
  </div>

</div>

</body>
</html>
